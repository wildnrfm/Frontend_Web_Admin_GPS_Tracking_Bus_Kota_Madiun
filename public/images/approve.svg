<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
  <!-- Red/Orange gradient background -->
  <defs>
    <linearGradient id="approveGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B91C1C;stop-opacity:1" />
    </linearGradient>
    <pattern id="approvePattern" x="0" y="0" width="150" height="150" patternUnits="userSpaceOnUse">
      <path d="M 0 75 L 75 0 L 150 75 L 75 150 Z" fill="rgba(255,255,255,0.05)" />
      <circle cx="75" cy="75" r="6" fill="rgba(255,255,255,0.03)" />
    </pattern>
  </defs>
  
  <rect width="1200" height="800" fill="url(#approveGrad)" />
  <rect width="1200" height="800" fill="url(#approvePattern)" />
  
  <!-- Checkmark and document -->
  <g opacity="0.1" transform="translate(600, 400)">
    <!-- Document stack -->
    <rect x="-120" y="-40" width="100" height="120" rx="8" fill="white" />
    <line x1="-120" y1="-10" x2="-20" y2="-10" stroke="white" stroke-width="8" />
    <line x1="-120" y1="10" x2="-20" y2="10" stroke="white" stroke-width="8" />
    
    <rect x="-100" y="10" width="100" height="120" rx="8" fill="white" />
    
    <!-- Large checkmark -->
    <path d="M 20 -30 L 50 0 L 100 -50" stroke="white" stroke-width="20" fill="none" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Check in circle -->
    <circle cx="150" cy="50" r="35" fill="white" opacity="0.8" />
    <path d="M 130 50 L 145 65 L 170 40" stroke="url(#approveGrad)" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>