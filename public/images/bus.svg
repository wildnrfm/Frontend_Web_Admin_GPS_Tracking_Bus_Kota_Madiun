<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
  <!-- Green gradient background -->
  <defs>
    <linearGradient id="busGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B5E37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F3D22;stop-opacity:1" />
    </linearGradient>
    <pattern id="busPattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <circle cx="50" cy="50" r="30" fill="rgba(255,255,255,0.05)" />
      <rect x="10" y="10" width="30" height="30" fill="rgba(255,255,255,0.03)" />
    </pattern>
  </defs>
  
  <rect width="1200" height="800" fill="url(#busGrad)" />
  <rect width="1200" height="800" fill="url(#busPattern)" />
  
  <!-- Bus silhouette -->
  <g opacity="0.1" transform="translate(600, 400)">
    <rect x="-150" y="-50" width="300" height="80" rx="10" fill="white" />
    <circle cx="-100" cy="40" r="15" fill="white" />
    <circle cx="100" cy="40" r="15" fill="white" />
    <rect x="-140" y="-40" width="40" height="40" rx="5" fill="rgba(255,255,255,0.3)" />
  </g>
</svg>