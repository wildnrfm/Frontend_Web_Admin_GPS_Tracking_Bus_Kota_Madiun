    <circle cx="-60" cy="-40" r="20" fill="white" />
    <rect x="-80" y="-15" width="40" height="50" rx="5" fill="white" />
    
    <circle cx="0" cy="-50" r="25" fill="white" />
    <path d="M -30 -20 L -35 30 L -5 30 L 0 -10 L 5 30 L 35 30 L 30 -20 Z" fill="white" />
    
    <circle cx="70" cy="-35" r="18" fill="white" />
    <path d="M 50 -12 L 45 35 L 65 35 L 70 -5 L 75 35 L 95 35 L 90 -12 Z" fill="white" />
  </g>
</svg>