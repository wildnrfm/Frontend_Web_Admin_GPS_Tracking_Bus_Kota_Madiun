<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
  <!-- Blue gradient background -->
  <defs>
    <linearGradient id="siswaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
    <pattern id="siswaPattern" x="0" y="0" width="120" height="120" patternUnits="userSpaceOnUse">
      <path d="M 60 10 Q 80 30 60 50 Q 40 30 60 10" fill="rgba(255,255,255,0.06)" />
      <circle cx="60" cy="60" r="8" fill="rgba(255,255,255,0.04)" />
    </pattern>
  </defs>
  
  <rect width="1200" height="800" fill="url(#siswaGrad)" />
  <rect width="1200" height="800" fill="url(#siswaPattern)" />
  
  <!-- Student silhouettes -->
